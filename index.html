<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>英语趣学</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F0F7F0;--card:#fff;--text:#333;--muted:#999;--pri:#4CAF50;--pri2:#66BB6A;--acc:#FF9800;--bdr:#f0f0f0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;transition:.3s}
body.dark{--bg:#1a1a2e;--card:#16213e;--text:#e0e0e0;--muted:#888;--bdr:#2a2a4a}
.nav{background:linear-gradient(135deg,var(--pri),var(--pri2));padding:14px 20px;color:#fff;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.nav h1{font-size:18px}.nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;justify-content:space-around;padding:6px 0;box-shadow:0 -2px 10px rgba(0,0,0,.05);z-index:100;transition:.3s}
.tab-item{text-align:center;cursor:pointer;padding:4px 10px;color:var(--muted)}.tab-item.active{color:var(--pri)}
.tab-icon{font-size:22px;display:block}.tab-text{font-size:11px}
.page{display:none;padding:14px;animation:fadeIn .3s}.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(76,175,80,.08);transition:.3s}
.card-title{font-size:15px;font-weight:bold;margin-bottom:10px}
.greeting{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;border-radius:16px;padding:22px;margin-bottom:14px}
.greeting h2{font-size:20px;margin-bottom:6px}.greeting p{opacity:.9;font-size:13px}
.stats{display:flex;justify-content:space-around;margin-bottom:14px}
.stat{background:var(--card);border-radius:12px;padding:14px;text-align:center;flex:1;margin:0 4px;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:.2s}
.stat:hover{transform:translateY(-2px)}.stat-num{font-size:26px;font-weight:bold;color:var(--pri);display:block}.stat-label{font-size:11px;color:var(--muted);margin-top:4px}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.action-btn{background:var(--card);border-radius:12px;padding:14px 6px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:.2s}
.action-btn:active{transform:scale(.95)}.action-emoji{font-size:26px;display:block;margin-bottom:4px}.action-text{font-size:11px;color:var(--text)}
.plants{display:flex;justify-content:space-between}.plant{flex:1;text-align:center;padding:8px 4px}.plant-emoji{font-size:30px;display:block;margin-bottom:4px;transition:.3s}
.plant-emoji:hover{transform:scale(1.2) rotate(10deg)}.plant-name{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.progress-bg{height:6px;background:var(--bdr);border-radius:3px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--pri),#81C784);border-radius:3px}
.plant-words{font-size:10px;color:var(--muted);margin-top:3px;display:block}
.quote{text-align:center;padding:14px}.quote-en{font-size:14px;color:var(--pri);font-style:italic;line-height:1.6;margin-bottom:6px}.quote-cn{font-size:12px;color:var(--muted)}
.word-card{background:var(--card);border-radius:20px;padding:36px 20px;text-align:center;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(76,175,80,.12);margin-bottom:16px;transition:.3s;position:relative}
.word-card.flipped{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff}
.word-card:active{transform:scale(.98)}.word-text{font-size:34px;font-weight:bold;margin-bottom:10px}.word-hint{font-size:12px;color:var(--muted)}
.word-card.flipped .word-hint{color:rgba(255,255,255,.8)}.word-meaning{font-size:26px;font-weight:bold;margin-bottom:14px}.word-example{font-size:13px;opacity:.9;line-height:1.6}
.word-actions{display:flex;gap:10px}.word-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer}
.btn-know{background:var(--pri);color:#fff}.btn-dontknow{background:var(--acc);color:#fff}
.speak-btn{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.1);border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px}
.word-card.flipped .speak-btn{background:rgba(255,255,255,.2)}
.fav-btn{position:absolute;top:16px;left:16px;background:none;border:none;font-size:20px;cursor:pointer}
.story-card{display:flex;align-items:center;background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:.2s}
.story-card:active{transform:scale(.98)}.story-emoji{font-size:32px;margin-right:12px}.story-info{flex:1}
.story-title{font-size:14px;font-weight:bold;display:block}.story-cn{font-size:11px;color:var(--muted);display:block;margin-top:2px}
.story-meta{display:flex;gap:6px;margin-top:4px}.story-tag{font-size:10px;background:rgba(76,175,80,.1);color:var(--pri);padding:2px 8px;border-radius:10px}
.reading-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;flex-direction:column}
.reading-overlay.active{display:flex}.reading-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--bdr);background:var(--card)}
.reading-close{font-size:22px;cursor:pointer;padding:6px}.reading-content{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.sentence-box{background:var(--card);border-radius:20px;padding:36px 20px;width:100%;text-align:center;box-shadow:0 4px 20px rgba(76,175,80,.12)}
.sentence-en{font-size:18px;line-height:1.6;margin-bottom:16px;display:block}.sentence-cn{font-size:14px;color:var(--muted);line-height:1.6}
.reading-footer{padding:14px 18px;border-top:1px solid var(--bdr);text-align:center;background:var(--card)}
.page-info{font-size:12px;color:var(--muted);margin-bottom:10px}.reading-btns{display:flex;gap:10px}
.reading-btns button{flex:1;padding:10px;border:none;border-radius:12px;font-size:14px;font-weight:bold;cursor:pointer}
.btn-prev{background:var(--bdr);color:var(--text)}.btn-next{background:var(--pri);color:#fff}
.start-btn{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;border:none;border-radius:50px;padding:12px 40px;font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 6px 20px rgba(76,175,80,.3)}
.start-btn:active{transform:scale(.95)}.quiz-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:14px}
.quiz-header{display:flex;justify-content:space-between;margin-bottom:16px}.quiz-progress{font-size:13px;color:var(--muted)}.quiz-score{font-size:13px;color:var(--pri);font-weight:bold}
.quiz-question{font-size:16px;font-weight:bold;line-height:1.6;margin-bottom:16px}
.option{display:flex;align-items:center;padding:12px;background:var(--bdr);border-radius:12px;margin-bottom:8px;cursor:pointer;border:3px solid transparent;transition:.2s}
.option.selected{border-color:var(--pri);background:rgba(76,175,80,.1)}.option.wrong{border-color:#F44336;background:rgba(244,67,54,.1)}
.option-letter{width:30px;height:30px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;margin-right:10px;flex-shrink:0}
.option-text{font-size:14px}.complete-card{text-align:center;padding:36px 18px}
.complete-emoji{font-size:56px;display:block;margin-bottom:14px;animation:bounce 1s infinite}.complete-title{font-size:22px;font-weight:bold;color:var(--pri);display:block;margin-bottom:16px}
.user-card{background:linear-gradient(135deg,var(--pri),var(--pri2));border-radius:16px;padding:28px;text-align:center;color:#fff;margin-bottom:14px}
.user-avatar{font-size:52px;display:block;margin-bottom:6px}.user-name{font-size:18px;font-weight:bold;display:block;margin-bottom:4px}.user-desc{font-size:12px;opacity:.9}
.achievements{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.achievement{text-align:center;padding:10px 6px;background:var(--bdr);border-radius:12px;transition:.3s}
.achievement.unlocked{background:rgba(76,175,80,.1)}.achievement.locked{opacity:.4}
.achievement-emoji{font-size:22px;display:block;margin-bottom:3px}.achievement-name{font-size:11px;font-weight:bold;display:block}.achievement-desc{font-size:9px;color:var(--muted);display:block}
.chart{display:flex;align-items:flex-end;justify-content:space-around;height:100px;padding:10px 0}
.bar-wrap{display:flex;flex-direction:column;align-items:center}.bar{width:24px;background:linear-gradient(180deg,var(--pri),#81C784);border-radius:5px 5px 0 0;min-height:4px}
.bar-label{font-size:10px;color:var(--muted);margin-top:4px}.bar-val{font-size:9px;color:var(--muted);margin-top:2px}
.section-title{font-size:15px;font-weight:bold;margin-bottom:10px}
.search-box{display:flex;gap:8px;margin-bottom:14px}.search-input{flex:1;padding:10px 16px;border:2px solid var(--bdr);border-radius:12px;font-size:14px;background:var(--card);color:var(--text);outline:none}
.search-input:focus{border-color:var(--pri)}.search-btn{padding:10px 16px;background:var(--pri);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:14px}
.fav-list{margin-top:10px}.fav-item{display:flex;align-items:center;padding:10px;background:var(--bdr);border-radius:10px;margin-bottom:6px}
.fav-word{font-weight:bold;margin-right:8px}.fav-meaning{color:var(--muted);flex:1;font-size:13px}.fav-del{color:#F44336;cursor:pointer;font-size:14px}
.share-btn{background:var(--pri);color:#fff;border:none;border-radius:12px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:bold}
.rank-item{display:flex;align-items:center;padding:10px;background:var(--bdr);border-radius:10px;margin-bottom:6px}
.rank-num{font-size:16px;font-weight:bold;color:var(--pri);width:30px;text-align:center}.rank-info{flex:1;margin-left:10px}.rank-name{font-size:14px;font-weight:bold}.rank-score{font-size:12px;color:var(--muted)}
.rank-medal{font-size:20px;margin-left:8px}
</style>
</head>
<body>
<div class="nav"><h1>🌱 英语趣学</h1><div><button class="nav-btn" onclick="toggleDark()" id="darkBtn">🌙</button> <button class="nav-btn" onclick="shareResult()">📤</button></div></div>

<div class="page active" id="page-home">
<div class="greeting"><h2 id="greet">早上好</h2><p>今天也要好好学习哦 💪</p></div>
<div class="stats"><div class="stat"><span class="stat-num" id="s-today">0</span><span class="stat-label">今日单词</span></div><div class="stat"><span class="stat-num" id="s-streak">0</span><span class="stat-label">连续天数</span></div><div class="stat"><span class="stat-num" id="s-total">0</span><span class="stat-label">累计单词</span></div></div>
<div class="card"><div class="card-title">🌱 我的花园</div><div class="plants" id="plants-box"></div></div>
<div class="actions"><div class="action-btn" onclick="go('vocabulary')"><span class="action-emoji">📖</span><span class="action-text">背单词</span></div><div class="action-btn" onclick="go('story')"><span class="action-emoji">📚</span><span class="action-text">读故事</span></div><div class="action-btn" onclick="go('daily')"><span class="action-emoji">🎯</span><span class="action-text">每日挑战</span></div><div class="action-btn" onclick="go('profile')"><span class="action-emoji">📊</span><span class="action-text">学习报告</span></div></div>
<div class="card"><div class="card-title">💡 每日一句</div><div class="quote"><div class="quote-en" id="dq"></div><div class="quote-cn" id="dqc"></div></div></div>
</div>

<div class="page" id="page-vocabulary">
<div class="search-box"><input class="search-input" id="wordSearch" placeholder="搜索单词..." oninput="searchWords()"><button class="search-btn" onclick="searchWords()">🔍</button></div>
<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><div style="flex:1;height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;"><div id="vbar" style="height:100%;background:linear-gradient(90deg,var(--pri),#81C784);border-radius:4px;width:0%;transition:width .3s;"></div></div><span id="vcnt" style="font-size:12px;color:var(--muted);">1/10</span></div>
<div id="v-search" style="display:none;"></div>
<div id="v-done" style="display:none;"><div class="card" style="text-align:center;padding:36px 18px;"><div style="font-size:56px">🎉</div><div style="font-size:20px;font-weight:bold;color:var(--pri);margin:14px 0 6px;">学习完成！</div><div style="color:var(--muted);margin-bottom:20px;">太棒了，继续加油！</div><div style="display:flex;justify-content:center;gap:16px;margin-bottom:20px;"><div style="background:rgba(76,175,80,.1);padding:14px 20px;border-radius:12px;text-align:center;"><div style="font-size:26px;font-weight:bold;color:var(--pri);" id="v-known">0</div><div style="font-size:11px;color:var(--muted);">已掌握</div></div><div style="background:rgba(255,152,0,.1);padding:14px 20px;border-radius:12px;text-align:center;"><div style="font-size:26px;font-weight:bold;color:var(--acc);" id="v-unknown">0</div><div style="font-size:11px;color:var(--muted);">需复习</div></div></div><button class="start-btn" onclick="initVocab()">再来一轮</button></div></div>
<div id="v-active"><div class="word-card" id="wcard" onclick="flipW()"><button class="fav-btn" id="favBtn" onclick="event.stopPropagation();toggleFav()">🤍</button><button class="speak-btn" onclick="event.stopPropagation();speakWord()">🔊</button><div id="wf"><div class="word-text" id="ww"></div><div class="word-hint">点击翻转查看释义</div></div><div id="wb" style="display:none;"><div class="word-meaning" id="wm"></div><div class="word-example" id="we"></div></div></div><div class="word-actions" id="wacts" style="display:none;"><button class="btn-know" onclick="markW(1)">认识 👍</button><button class="btn-dontknow" onclick="markW(0)">不认识 👎</button></div></div>
</div>

<div class="page" id="page-story"><div class="section-title">📚 情景故事闯关</div><div id="slist"></div></div>
<div class="reading-overlay" id="roverlay"><div class="reading-header"><span style="font-weight:bold" id="rtitle"></span><span class="reading-close" onclick="closeR()">✕</span></div><div class="reading-content"><div class="sentence-box"><span class="sentence-en" id="sen"></span><span class="sentence-cn" id="scn"></span><button class="speak-btn" style="position:relative;top:auto;right:auto;margin-top:12px" onclick="speakSentence()">🔊</button></div></div><div class="reading-footer"><div class="page-info" id="pinfo"></div><div class="reading-btns"><button class="btn-prev" onclick="prevS()">上一句</button><button class="btn-next" id="btnNext" onclick="nextS()">下一句</button></div></div></div>

<div class="page" id="page-daily">
<div id="d-intro"><div class="card" style="text-align:center;padding:36px 18px;"><div style="font-size:56px">🎯</div><div style="font-size:20px;font-weight:bold;margin:14px 0 6px;">每日英语挑战</div><div style="color:var(--muted);margin-bottom:24px;">每天5分钟，轻松学英语</div><div style="display:flex;justify-content:space-around;margin-bottom:24px;"><div style="text-align:center"><div style="font-size:22px">📝</div><div style="font-size:11px;color:var(--muted)">10道精选题</div></div><div style="text-align:center"><div style="font-size:22px">⏱️</div><div style="font-size:11px;color:var(--muted)">限时10分钟</div></div><div style="text-align:center"><div style="font-size:22px">🏆</div><div style="font-size:11px;color:var(--muted)">挑战最高分</div></div></div><button class="start-btn" onclick="startQuiz()">开始挑战</button></div></div>
<div id="d-quiz" style="display:none;"><div class="quiz-card"><div class="quiz-header"><span class="quiz-progress" id="qprog"></span><span class="quiz-score" id="qscore"></span></div><div class="quiz-question" id="qq"></div><div id="qopts"></div></div></div>
<div id="d-done" style="display:none;"><div class="card complete-card"><div id="d-emoji" style="font-size:56px">🏆</div><div class="complete-title">挑战完成！</div><div><span style="font-size:50px;font-weight:bold;color:var(--pri);" id="dscore">0</span><span style="font-size:14px;color:var(--muted)"> 分</span></div><div style="color:var(--muted);margin:14px 0" id="dmsg"></div><div style="margin-bottom:20px"><span style="font-size:15px;color:var(--acc);font-weight:bold">🔥 连续学习 <span id="dstreak">0</span> 天</span></div><button class="start-btn" onclick="resetD()">再来一次</button></div></div>
</div>

<div class="page" id="page-profile">
<div class="user-card"><span class="user-avatar">😊</span><span class="user-name">英语学习者</span><span class="user-desc">坚持学习，每天进步一点点</span></div>
<div class="card"><div class="stats"><div class="stat"><span class="stat-num" id="p-total">0</span><span class="stat-label">总单词量</span></div><div class="stat"><span class="stat-num" id="p-streak">0</span><span class="stat-label">连续天数</span></div><div class="stat"><span class="stat-num" id="p-fav">0</span><span class="stat-label">收藏</span></div></div></div>
<div class="card"><div class="card-title">📊 本周学习</div><div class="chart" id="wchart"></div></div>
<div class="card"><div class="card-title">⭐ 我的收藏</div><div class="fav-list" id="favList"></div></div>
<div class="card"><div class="card-title">🏆 成就徽章</div><div class="achievements" id="achs"></div></div>
<div class="card"><div class="card-title">🏅 排行榜</div><div id="rankList"></div></div>
<div class="card" style="text-align:center;"><button class="share-btn" onclick="shareResult()">📤 分享我的成绩</button></div>
</div>
